<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Attendance System - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="login-card">
            <div class="logo">
                <h1>📋 Cloud Attendance System</h1>
                <p>Powered by AWS</p>
            </div>
            
            <form id="loginForm">
                <div class="input-group">
                    <label>Username</label>
                    <input type="text" id="username" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit">Login</button>
            </form>
            
            <div class="register-link">
                <a href="#" onclick="showRegister()">New user? Register here</a>
            </div>
        </div>
        
        <div class="register-card" style="display: none;">
            <div class="logo">
                <h1>📋 Register</h1>
            </div>
            <form id="registerForm">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="regName" required>
                </div>
                <div class="input-group">
                    <label>Username</label>
                    <input type="text" id="regUsername" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="regPassword" required>
                </div>
                <div class="input-group">
                    <label>Role</label>
                    <select id="regRole">
                        <option value="student">Student</option>
                        <option value="faculty">Faculty</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                <button type="submit">Register</button>
                <button type="button" onclick="showLogin()">Back to Login</button>
            </form>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
